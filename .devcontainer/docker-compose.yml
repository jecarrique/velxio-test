# GitHub Codespaces — entorno de desarrollo ESP32-C3 con Velxio
# La imagen ghcr.io/davidmonterocrespo24/velxio:master ya incluye:
#   - ESP-IDF 4.4.7 con soporte para ESP32-C3 (RISC-V)
#   - Arduino-ESP32 core 2.0.17
#   - arduino-cli
#   - QEMU para simulación del ESP32-C3
#   - Interfaz web Velxio (IDE en el navegador)
services:
  velxio:
    image: ghcr.io/davidmonterocrespo24/velxio:master
    # sleep infinity mantiene el contenedor activo para que VS Code Server
    # pueda conectarse; el postStartCommand de devcontainer.json lanza la app.
    command: sleep infinity
    volumes:
      - ../:/workspace:cached
      - arduino-libs:/root/.arduino15
      - arduino-user-libs:/root/Arduino
      - ccache:/var/cache/ccache
      - velxio-build:/var/lib/velxio-build
      - velxio-data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/velxio.db
      - DATA_DIR=/app/data
      - IDF_PATH=/opt/esp-idf
      - IDF_TOOLS_PATH=/root/.espressif
      - ARDUINO_ESP32_PATH=/opt/arduino-esp32
      - IDF_CCACHE_ENABLE=1
      - CCACHE_DIR=/var/cache/ccache
      - VELXIO_PERSISTENT_BUILD_DIR=1

volumes:
  arduino-libs:
  arduino-user-libs:
  ccache:
  velxio-build:
  velxio-data:
